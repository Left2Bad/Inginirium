<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,500,600,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 17px 25px;
        }
        .left-col {
            display: flex;
            flex-direction: column;
        }
        .left-col * {
            margin: 2px;
            font-size: 13px;
        }
        .right-col {
            display: flex;
            gap: 50px;
        }
        .btn {
            padding: 15px 45px;
            background-color: #80408c;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 25px;
        }
        .second-header-container {
            display: flex;
            justify-content:baseline;
            align-items: center;
            padding: 17px 25px;
        }
        .second-header-container a {
            margin-left: 50px;
            text-decoration: none;
            color: black;
            font-size: 13px;
            padding: 8px;
            border-radius: 15px;
        }
        .second-header-container a:hover {
            border: 1px solid black;
        }
    </style>
    
</head>
<body>
    <header>
        <div class="header-container">
            <div class="left-col">
                <h3 class="title">ЦЕНТР МОЛОДЕЖНОГО ИННОВАЦИОННОГО ТВОРЧЕСТВА И ТЕХНОПАРК</h3>
                <p class="text">Лицензия на осуществление образовательной деятельности № Есть</p>
            </div>
            <div class="right-col">
                <button class="btn">Другой город</button>
                <button class="btn">ЗАПИСАТЬСЯ</button>
            </div>
        </div>
        <div class="second-header-container">
            <img src="inginirium.png" alt="Логотип">
            <a href="#">РЕЗУЛЬТАТЫ</a>
            <a href="#">ПРОГРАММЫ</a>

    </header>
    <main></main>
    <footer>
    </footer>
</body>
</html>
